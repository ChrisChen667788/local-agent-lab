    <g transform="translate(0 56)">
      <rect width="488" height="162" rx="28" fill="#0F172A"/>
      <text x="30" y="42" fill="#67E8F9" font-family="SF Pro Text, Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2.8">BENCHMARK</text>
