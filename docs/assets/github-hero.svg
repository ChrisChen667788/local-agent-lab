    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="380" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2DD4F4"/>
      <stop offset="1" stop-color="#6A6FF7"/>
    </linearGradient>
    <filter id="shadow" x="798" y="150" width="676" height="650" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="32" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1600" height="900" rx="44" fill="url(#bg)"/>
  <circle cx="154" cy="160" r="130" fill="#DBEAFE" fill-opacity="0.74"/>
  <circle cx="1452" cy="742" r="214" fill="#D1FAE5" fill-opacity="0.66"/>
  <circle cx="1374" cy="158" r="92" fill="#FDE68A" fill-opacity="0.46"/>
  <rect x="120" y="126" width="520" height="56" rx="28" fill="white" fill-opacity="0.82"/>
  <text x="152" y="162" fill="#53627B" font-family="SF Pro Text, Inter, Arial, sans-serif" font-size="21" font-weight="700" letter-spacing="3.2">OPEN SOURCE · LOCAL-FIRST AGENT OPS</text>

  <rect x="120" y="212" width="614" height="520" rx="40" fill="url(#panel)"/>
  <text x="164" y="286" fill="#93C5FD" font-family="SF Pro Text, Inter, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="3.4">LOCAL AGENT LAB</text>
  <text x="164" y="392" fill="white" font-family="SF Pro Display, Inter, Arial, sans-serif" font-size="80" font-weight="720" letter-spacing="-3.2">Operate models</text>
  <text x="164" y="478" fill="white" font-family="SF Pro Display, Inter, Arial, sans-serif" font-size="80" font-weight="720" letter-spacing="-3.2">with clarity.</text>
  <text x="164" y="584" fill="#D9E6FF" font-family="SF Pro Text, Inter, Arial, sans-serif" font-size="25" font-weight="560">Run MLX local runtimes, compare 32K lanes,</text>
  <text x="164" y="620" fill="#D9E6FF" font-family="SF Pro Text, Inter, Arial, sans-serif" font-size="25" font-weight="560">and review replay, trace, and recovery.</text>
