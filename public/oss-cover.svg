      <feDropShadow dx="0" dy="28" stdDeviation="32" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1600" height="900" rx="44" fill="url(#bg)"/>
  <circle cx="146" cy="158" r="126" fill="#DBEAFE" fill-opacity="0.72"/>
  <circle cx="1452" cy="746" r="206" fill="#D1FAE5" fill-opacity="0.68"/>
  <circle cx="1380" cy="164" r="92" fill="#FDE68A" fill-opacity="0.5"/>
  <rect x="120" y="126" width="710" height="56" rx="28" fill="white" fill-opacity="0.82"/>
  <text x="150" y="162" fill="#475569" font-family="SF Pro Text, Inter, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="4">LOCAL-FIRST AGENT OPS · BENCHMARK, TRACE, AND RUNTIME CONTROL</text>
  <rect x="120" y="222" width="624" height="514" rx="38" fill="url(#hero)"/>
