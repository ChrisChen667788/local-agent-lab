      <stop stop-color="#FFF5E4"/>
      <stop offset="0.48" stop-color="#EEF4FF"/>
      <stop offset="1" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="hero" x1="140" y1="180" x2="760" y2="760" gradientUnits="userSpaceOnUse">
